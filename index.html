<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تشفير وفك تشفير</title>
<style>
body{
    font-family: Arial;
    background:#1e1e1e;
    color:white;
    text-align:center;
    padding:20px;
}
textarea{
    width:90%;
    height:150px;
    font-size:18px;
    margin:10px;
    padding:10px;
}
button{
    padding:10px 20px;
    margin:5px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<h2>التشفير / فك التشفير</h2>

<textarea id="input" placeholder="اكتب النص هنا"></textarea><br>

<button onclick="encrypt()">تشفير</button>
<button onclick="decrypt()">فك التشفير</button>
<button onclick="copyText()">نسخ الناتج</button>

<textarea id="output" readonly placeholder="الناتج"></textarea>

<script>

const map = {
'ا':'و',
'و':'ا',

'ب':'م',
'م':'ب',

'ت':'ث',
'ث':'ت',

'ج':'خ',
'خ':'ج',

'د':'ذ',
'ذ':'د',

'ر':'ز',
'ز':'ر',

'س':'ش',
'ش':'س',

'ص':'ض',
'ض':'ص',

'ط':'ظ',
'ظ':'ط',

'ع':'غ',
'غ':'ع',

'ف':'ق',
'ق':'ف',

'ك':'ڤ',
'ڤ':'ك',

'ل':'ن',
'ن':'ل'
};

function convert(text){
    let result="";
    for(let c of text){
        result += map[c] || c;
    }
    return result;
}

function encrypt(){
    document.getElementById("output").value =
        convert(document.getElementById("input").value);
}

function decrypt(){
    document.getElementById("output").value =
        convert(document.getElementById("input").value);
}

function copyText(){
    const out=document.getElementById("output");
    out.select();
    document.execCommand("copy");
}

</script>

</body>
</html>
